<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Ascii</title>
</head>
<body>
    <input type="file" id="input" accept="image/*" /> <br>
    <img id="displayImage" src = "#" /> <br>

    <label>Scale: </label>
    <input type="number" min="0" max="10" value = "6" id="scale_input" /> <br>

    <button id="convert_button">Convert</button>
    <br><br>
    
    <textarea rows="1" cols="1" id="ascii_output" style="font-family: 'Courier New', Courier, monospace;"></textarea>


    <img src="#" id="resized_image" hidden/>
    <canvas id="ascii_canvas" hidden></canvas>
    <script src="script.js"> </script>
</body>
</html>
