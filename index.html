<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Ascii</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <div class="displays">
            <canvas id="ascii_canvas" width="512" height="512"></canvas>
            <div id="ascii_div">
                <p id="ascii_text"></p>
            </div> 
        </div>
        

        <div class="controls">
            <input type="file" id="input" accept="image/*" /> <br>
            <label>Scale: </label>
            <input type="range" min="1" max="10" value = "1" id="scale_input" />
        </div>

    </div>
   

    <script src="script.js"> </script>
</body>
</html>
