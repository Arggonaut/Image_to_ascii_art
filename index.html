<!DOCTYPE html>
<html lang="en">
<head>

    <title>Image to Ascii</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <!-- <textarea readonly rows="30" cols="64" id="ascii_output"></textarea> -->

        </div>

    </div>
    
    <img src="#" id="resized_image" hidden />

</body>
